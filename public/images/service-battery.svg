<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#batteryGrad)"/>
  <g opacity="0.2">
    <rect x="400" y="300" width="400" height="280" fill="white" rx="20"/>
    <rect x="500" y="250" width="60" height="50" fill="white" rx="8"/>
    <rect x="640" y="250" width="60" height="50" fill="white" rx="8"/>
    <text x="600" y="480" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="rgba(5, 95, 70, 0.3)" text-anchor="middle">+</text>
  </g>
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">BATTERY</text>
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.8)" text-anchor="middle">Testing &amp; Replacement</text>
